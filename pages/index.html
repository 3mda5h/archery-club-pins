<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- <script defer type="module" src="/assets/js/"></script>  -->
        <link rel="stylesheet" href="/assets/style.css">

        <title>Pins</title>
    </head>
    <body>
        <main>
            <h1>Emily's Scorecard</h1>
            <table>
                <tr>
                    <th id="end-header" class="end-label">End</th>
                    <th colspan="5">Arrows</th>
                </tr>
                <tr>
                    <!-- inputmode="numeric" pattern="[0-9]*" make android and IOS open the number pad automatically-->
                    <th class="end-label">1</th>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></input></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                </tr>
                <tr>
                    <th class="end-label">2</th>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                </tr>
                <tr>
                    <th class="end-label">3</th>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                </tr>
                <tr>
                    <th class="end-label">4</th>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                </tr>
                <tr>
                    <th class="end-label">5</th>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                </tr>
                <tr>
                    <th class="end-label">6</th>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></input></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input type="number" inputmode="numeric" pattern="[0-9]*"></td>
                </tr>
                <tr id="end-total-row">
                    <th colspan="4">End Total: </th>
                    <th colspan="2" id="end-total">200</th>
                </tr>
                <tr id="running-total-row">
                    <th colspan="4">Running Total: </th>
                    <th colspan="2" id="running-total">200</th>
                </tr>
            </table>
            
            <button id="submit-scorecard-button">Submit Scorecard</button>
        </main>    
    </body>
</html>
